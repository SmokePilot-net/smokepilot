{% extends "base.html" %}
{% block title %}Config Preview - SmokePing Manager{% endblock %}
{% block content %}
<div class="card">
    <h2>Generated SmokePing Config</h2>
    <p style="font-size: 13px; color: #888; margin-bottom: 12px;">
        This is what will be written to the @include file. Add
        <code>@include managed-targets</code> to your SmokePing Targets config.
    </p>
    <pre>{{ config }}</pre>
</div>
<div style="display: flex; gap: 8px;">
    <a href="{{ url_for('index') }}" class="btn btn-primary">Back</a>
    <form method="post" action="{{ url_for('deploy_config') }}">
        <button type="submit" class="btn btn-success">Write Config</button>
    </form>
    <form method="post" action="{{ url_for('deploy_config') }}">
        <input type="hidden" name="reload" value="1">
        <button type="submit" class="btn btn-success">Write + Reload SmokePing</button>
    </form>
</div>
{% endblock %}
